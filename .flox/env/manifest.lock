    "hook": {
      "on-activate": "[[ ! -z \"${FLX_VERBOSE}\" ]] && echo \"##################################################\";\n[[ ! -z \"${FLX_VERBOSE}\" ]] && echo \"########## FLOX ACTIVATE...\";\n\n#alias lss='ls -alshF --color=auto'\nlss () {\n    command ls -alshF --color=auto \"$@\"\n}\n\n# PWD=$(pwd);\n# [[ ! -z \"${FLX_VERBOSE}\" ]] && echo \"-----> PWD: ${PWD}\";\n# unset PWD\n\n#FLOX_ENV_PROJECT\n#_FLOX_ENV_LOG_DIR\n#FLOX_CACHE_DIR=\"$(dirname ${FLOX_ENV_CACHE})\"\n#FLOX_CACHE_DIR=\"$(realpath ${FLOX_ENV_CACHE})\"\nFLOX_CACHE_DIR=\"${FLOX_ENV_CACHE}\"\n[[ ! -z \"${FLX_VERBOSE}\" ]] && echo \"-----> FLOX_CACHE_DIR: ${FLOX_CACHE_DIR}\";\n\nif [[ ! -z \"${FLX_VERBOSE}\" ]]; then\n\necho \"=====> NODE VERSION: $(node --version)\";\nWHICH_NODE=$(which node);\necho \".....> NODE WHICH: ${WHICH_NODE}\";\nlss \"${WHICH_NODE}\";\nunset WHICH_NODE\n\necho \"=====> NPM VERSION (init): $(npm --version)\";\nWHICH_NPM=$(which npm);\necho \".....> NPM WHICH: ${WHICH_NPM}\";\nlss \"${WHICH_NPM}\";\nunset WHICH_NPM\n\necho \"-----> NPM CONFIG PREFIX (init): $(npm config get prefix)\";\necho \"-----> NPM_CONFIG_PREFIX (init): ${NPM_CONFIG_PREFIX}\";\n\necho \"-----> NPM CONFIG CACHE (init): $(npm config get cache)\"\necho \"-----> NPM_CONFIG_CACHE (init): ${NPM_CONFIG_CACHE}\";\n\nfi\n\n# envName=\"${_FLOX_ACTIVE_ENVIRONMENTS##:*}\";\n#echo \"${envName}\";\n#export NPM_CONFIG_PREFIX=\"/tmp/${envName}-npm\";\n\nexport NPM_CONFIG_PREFIX=\"${FLOX_CACHE_DIR}/NPM_PREFIX\";\nrm -rf \"$NPM_CONFIG_PREFIX\";\nmkdir -p \"$NPM_CONFIG_PREFIX\";\nif [[ ! -z \"${FLX_VERBOSE}\" ]]; then\necho \"-----> NPM CONFIG PREFIX: $(npm config get prefix)\";\necho \"-----> NPM_CONFIG_PREFIX: ${NPM_CONFIG_PREFIX}\";\nlss \"$NPM_CONFIG_PREFIX\";\nlss \"$NPM_CONFIG_PREFIX/bin\";\nlss \"$NPM_CONFIG_PREFIX/lib\";\nlss \"$NPM_CONFIG_PREFIX/lib/node_modules\";\nfi\n\nexport NPM_CONFIG_CACHE=\"${FLOX_CACHE_DIR}/NPM_CACHE\";\nrm -rf \"$NPM_CONFIG_CACHE\";\n#### rm -rf \"$NPM_CONFIG_CACHE/_cacache/\"\nmkdir -p \"$NPM_CONFIG_CACHE\";\nif [[ ! -z \"${FLX_VERBOSE}\" ]]; then\necho \"-----> NPM CONFIG CACHE: $(npm config get cache)\"\necho \"-----> NPM_CONFIG_CACHE: ${NPM_CONFIG_CACHE}\";\nlss \"$NPM_CONFIG_CACHE\";\nfi\n\nunset FLOX_CACHE_DIR\n\n[[ ! -z \"${FLX_VERBOSE}\" ]] && echo \"-----> NODE_PATH (init): ${NODE_PATH}\";\nexport NODE_PATH=\"$NPM_CONFIG_PREFIX/lib/node_modules${NODE_PATH:+:$NODE_PATH}\";\n[[ ! -z \"${FLX_VERBOSE}\" ]] && echo \"-----> NODE_PATH: ${NODE_PATH}\";\n\n#if [[ ! -v FLX_VERBOSE ]]; then\n## unset\n#npm install -g sfw --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root\n#elif [[ -z \"${FLX_VERBOSE}\" ]]; then\n## empty\n#npm install -g sfw --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root\n#else\n#npm install -g sfw --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root 1>/dev/null\n#fi\nnpm install --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root -g sfw\n\nexport PATH=\"$NPM_CONFIG_PREFIX/bin:$PATH\";\n[[ ! -z \"${FLX_VERBOSE}\" ]] && ls -alshFR --color=auto \"$NPM_CONFIG_PREFIX/lib/node_modules/sfw/.sfw-cache\"\n\n#if [[ ! -v FLX_VERBOSE ]]; then\n## unset\n#sfw npm install -g npm --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root\n#sfw npm install -g npm-check-updates --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root\n## sfw npm install -g @electron/asar --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root\n#elif [[ -z \"${FLX_VERBOSE}\" ]]; then\n## empty\n#sfw npm install -g npm --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root\n#sfw npm install -g npm-check-updates --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root\n## sfw npm install -g @electron/asar --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root\n#else\n#sfw npm install -g npm --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root 1>/dev/null\n#sfw npm install -g npm-check-updates --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root 1>/dev/null\n## sfw npm install -g @electron/asar --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root 1>/dev/null\n#fi\n\n# https://github.com/npm/cli/issues/9133\nsfw npm install --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root -g npm\n\n#sfw npm install --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root -g npm-check-updates\n#sfw npm install --ignore-scripts --foreground-scripts --min-release-age=3 --allow-git=root -g @electron/asar\n\n[[ ! -z \"${FLX_VERBOSE}\" ]] && ls -alshFR --color=auto \"$NPM_CONFIG_PREFIX/lib/node_modules/sfw/.sfw-cache\"\n\n"
