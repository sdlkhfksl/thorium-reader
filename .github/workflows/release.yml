###########################
  release_job:
    needs: build_job
    permissions:
      actions: none
      artifact-metadata: none
      attestations: none
      checks: none
      contents: write # <==========
      deployments: none
      discussions: none
      id-token: none
      issues: none
      models: none
      packages: none
      pages: none
      pull-requests: none
      repository-projects: none
      security-events: none
      statuses: none
#   if: "!contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
#   if: ${{ github.ref == 'refs/heads/develop' }}
#   if: "github.event_name != 'pull_request'"
    if: "!contains(github.event.head_commit.message, 'skip ci') && github.repository_owner == 'edrlab' && github.repository == 'edrlab/thorium-reader'"
    runs-on: ${{ matrix.runson }}
    strategy:
      fail-fast: false
      matrix:
        osarch: [windows-intel, windows-arm, macos-intel, macos-arm, linux-intel, linux-arm]
        include:
          - osarch: windows-intel
            runson: ubuntu-latest # windows-2025
            packname: win
            release_tag: latest-windows-intel
          - osarch: windows-arm
            runson: ubuntu-latest # windows-2025
            packname: win
            release_tag: latest-windows-arm
          - osarch: macos-intel
            runson: ubuntu-latest # macos-latest #macos-14-arm64
            packname: 'mac'
            release_tag: latest-macos-intel
          - osarch: macos-arm
            runson: ubuntu-latest # macos-latest #macos-14-arm64
            packname: 'mac'
            release_tag: latest-macos-arm
          - osarch: linux-intel
            runson: ubuntu-latest # ubuntu-22.04 #ubuntu-latest is ubuntu-24.04
            packname: linux
            release_tag: latest-linux-intel
          - osarch: linux-arm
            runson: ubuntu-latest # ubuntu-22.04 #ubuntu-latest is ubuntu-24.04
            packname: linux
            release_tag: latest-linux-arm
#    env:
#      RELEASE_TAG: ${{ matrix.release_tag }} # ONLY NEEDED in scripts/release-github.mjs
    steps:
###########################
    - name: Checkout
# https://github.com/actions/checkout/commits/v6.0.2
# https://github.com/actions/checkout/commits/de0fac2e4500dabe0009e67214ff5f5447ce83dd
# https://github.com/actions/checkout/compare/v6.0.2...de0fac2e4500dabe0009e67214ff5f5447ce83dd
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
###########################
    - name: Download Artifact
# https://github.com/actions/download-artifact/commits/v8.0.1
# https://github.com/actions/download-artifact/commits/3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
# https://github.com/actions/download-artifact/compare/v8.0.1...3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: artifact-${{ matrix.release_tag }}-${{ github.run_id }}
#        artifact-ids: artifact-latest-linux-arm-${{ github.run_id }},artifact-latest-windows-arm-${{ github.run_id }},artifact-latest-macos-arm-${{ github.run_id }},artifact-latest-linux-intel-${{ github.run_id }},artifact-latest-windows-intel-${{ github.run_id }},artifact-latest-macos-intel-${{ github.run_id }}
#        merge-multiple: true
        path: release
###########################
# https://github.com/actions/setup-node/commits/v6.4.0
# https://github.com/actions/setup-node/commits/48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
# https://github.com/actions/setup-node/compare/v6.4.0...48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
#    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
#      with:
#        node-version: '24'
#        cache: ''
#        package-manager-cache: false
#        #check-latest: true
###########################
#    - run: node --version && npm --version
###########################
#    - run: npm --global install npm
###########################
#    - run: npm --version
###########################
#    - run: npm --global install @octokit/rest
###########################
    - name: GitHub Tagged Release Create and Upload Build Artefacts
      env:
#GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#run: ls -alsR release ; node scripts/release-github.mjs
# GH_TOKEN: ${{ github.token }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: >
        ls -alsR release ; (gh release create ${{ github.ref_name }} --target=develop --latest=false --prerelease --draft --title="Thorium Desktop reader ${{ github.ref_name }}" --notes="Expand the 'Assets' below to reveal the download links (build job: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" || echo OK || true) ; gh release upload ${{ github.ref_name }} "./release/*.*" --clobber
